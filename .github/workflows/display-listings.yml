name: Display listing checker

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: display-listing-checker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install requests

      - name: Check listings
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || github.event_name == 'push' && '1' || '0' }}
          MAX_PRICE_SEK: "500"
          ALERT_EMAIL: "chatgpt.idiot.stupid@gmail.com"
          NTFY_TOPIC: "display-deals-55r0v7m6k2q8ps"
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          TRADERA_APP_ID: ${{ secrets.TRADERA_APP_ID }}
          TRADERA_APP_KEY: ${{ secrets.TRADERA_APP_KEY }}
        run: python checker.py

      - name: Commit seen-state changes
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add seen.json
            git commit -m "Update seen display listings"
            git pull --rebase
            git push
          else
            echo "seen.json unchanged"
          fi
